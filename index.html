<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, follow">
    <meta name="description" content="Page not found - freetobook">
    <meta property="og:locale" content="en_GB">
    <meta property="og:title" content="Page not found - freetobook">
    <meta property="og:site_name" content="freetobook">
    <title>Page not found - freetobook</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="main.js" defer></script>

    <style>
      :root {
        --brand-blue: #009ffd;
        --brand-blue-dark: #007ac2;
        --ink: #14213d;
        --muted: #6b7280;
        --paper: #ffffff;
        --page-bg: #f5fbff;
        --line: #cfeefc;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        background: var(--page-bg);
        color: var(--ink);
        font-family: halcom, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
      }

      a {
        color: inherit;
      }

      #view__404 {
        align-items: center;
        display: flex;
        min-height: 100vh;
        padding: clamp(24px, 5vw, 64px);
      }

      .container__404 {
        display: grid;
        gap: clamp(20px, 3vw, 36px);
        justify-items: center;
        margin: 0 auto;
        max-width: 980px;
        text-align: center;
        width: 100%;
      }

      .game {
        align-items: center;
        display: flex;
        height: 100%;
        justify-content: center;
        margin: auto;
        max-width: 700px;
        width: min(70%, 700px);
      }

      .error {
        align-items: center;
        color: var(--muted);
        display: flex;
        font-size: 0.82rem;
        font-weight: 800;
        gap: 16px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        width: min(420px, 100%);
      }

      .error span:not(.text) {
        background: var(--line);
        display: block;
        flex: 1;
        height: 2px;
      }

      .container__404 h1 {
        font-size: clamp(2rem, 5vw, 4.5rem);
        letter-spacing: 0;
        line-height: 1.05;
        margin: 0;
        max-width: 820px;
      }

      .btn-primary {
        align-items: center;
        background: var(--brand-blue);
        border-radius: 999px;
        color: #ffffff;
        display: inline-flex;
        font-weight: 800;
        justify-content: center;
        min-height: 48px;
        padding: 0 28px;
        text-decoration: none;
        transition: background-color 160ms ease, transform 160ms ease;
      }

      .btn-primary:hover {
        background: var(--brand-blue-dark);
        transform: translateY(-1px);
      }

      .btn-primary:focus-visible {
        outline: 3px solid #f7c948;
        outline-offset: 4px;
      }

      .arrow::after {
        content: "→";
        margin-left: 10px;
      }

      @media (max-width: 700px) {
        .game {
          width: 100%;
        }

        #view__404 {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body class="error404">
    <main id="view__404">
      <div class="container__404">
        <div class="game">
          <free-to-book></free-to-book>
        </div>

        <div class="error" aria-label="Error 404">
          <span></span>
          <span class="text">Error 404</span>
          <span></span>
        </div>

        <h1>Sorry, we can’t find that page</h1>
        <a href="https://en.freetobook.com" title="Return to Homepage" class="btn-primary arrow">Return to Homepage</a>
      </div>
    </main>
  </body>
</html>
